services:
  lab:
    image: langchain-lab-lab:latest
    container_name: langchain-catalog-lab
    env_file:
      - .env
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./storage:/app/storage
    command:
      - python
      - catalog/health/00_healthcheck.py
    networks:
      - shared-net

  api:
    image: langchain-lab-api:latest
    container_name: langchain-catalog-api
    env_file:
      - .env
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./:/app
    command: uvicorn app.server.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8050:8000"
    networks:
      - shared-net

networks:
  shared-net:
    external: true
